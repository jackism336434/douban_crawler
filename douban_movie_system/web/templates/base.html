<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}豆瓣电影档案{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* ═══════════════════════════════════════════════════════
           Film Archive  ·  Design System
           A typography-driven editorial layout for film data.
           No Bootstrap. No emoji decoration. No colored cards.
           ═══════════════════════════════════════════════════════ */

        /* ── Reset ──────────────────────────────────────────── */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* ── Design Tokens ──────────────────────────────────── */
        :root {
            --ink:        #1c1c1c;
            --ink-light:  #6b6b6b;
            --ink-muted:  #999999;
            --paper:      #fafaf8;
            --surface:    #f3f3f0;
            --surface-alt:#ebebeb;
            --red:        #c1272d;
            --red-dim:    #a32227;
            --rule:       #e4e4e2;
            --white:      #ffffff;

            --serif:      "Noto Serif SC", "Songti SC", "SimSun", serif;
            --sans:       -apple-system, BlinkMacSystemFont, "PingFang SC",
                          "Microsoft YaHei", "Helvetica Neue", sans-serif;
            --mono:       "SF Mono", "Cascadia Code", "Consolas", monospace;

            --max-width:  1080px;
            --gap:        24px;
            --section:    80px;
        }

        /* ── Base ───────────────────────────────────────────── */
        html {
            font-size: 16px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
        }

        body {
            font-family: var(--sans);
            color: var(--ink);
            background: var(--paper);
            line-height: 1.7;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── Typography ─────────────────────────────────────── */
        h1, h2, h3, h4, h5 {
            font-family: var(--serif);
            font-weight: 600;
            line-height: 1.25;
            letter-spacing: 0.01em;
            color: var(--ink);
        }

        h1 { font-size: 2rem; }
        h2 { font-size: 1.5rem; }
        h3 { font-size: 1.25rem; }
        h4 { font-size: 1.1rem; }
        h5 { font-size: 0.95rem; }

        p {
            margin-bottom: 1rem;
            color: var(--ink);
        }

        a {
            color: var(--ink);
            text-decoration: none;
            transition: color 0.15s ease;
        }
        a:hover { color: var(--red); }
        a:focus-visible {
            outline: 2px solid var(--red);
            outline-offset: 3px;
            border-radius: 2px;
        }

        small, .meta { color: var(--ink-light); font-size: 0.85rem; }

        hr {
            border: none;
            border-top: 1px solid var(--rule);
            margin: var(--gap) 0;
        }

        /* ── Layout ─────────────────────────────────────────── */
        .container {
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 0 28px;
        }

        .content {
            flex: 1;
            padding-top: 32px;
            padding-bottom: var(--section);
        }

        /* ── Navigation (Masthead) ──────────────────────────── */
        .masthead {
            border-bottom: 1px solid var(--rule);
            background: var(--white);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(8px);
            background: rgba(250, 250, 248, 0.92);
        }

        .masthead .container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 56px;
        }

        .masthead-brand {
            font-family: var(--serif);
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--ink);
            letter-spacing: 0.02em;
            white-space: nowrap;
        }
        .masthead-brand:hover {
            color: var(--ink);
        }

        .masthead-nav {
            display: flex;
            gap: 28px;
            list-style: none;
        }
        .masthead-nav a {
            font-size: 0.88rem;
            color: var(--ink-light);
            padding: 4px 0;
            border-bottom: 2px solid transparent;
            transition: color 0.15s, border-color 0.15s;
        }
        .masthead-nav a:hover,
        .masthead-nav a.active {
            color: var(--ink);
            border-bottom-color: var(--red);
        }

        .masthead-toggle {
            display: none;
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
        }
        .masthead-toggle span {
            display: block;
            width: 20px;
            height: 1.5px;
            background: var(--ink);
            margin: 5px 0;
            transition: transform 0.2s;
        }

        /* ── Footer ─────────────────────────────────────────── */
        .site-footer {
            border-top: 1px solid var(--rule);
            padding: 32px 0;
            color: var(--ink-muted);
            font-size: 0.82rem;
            text-align: center;
        }

        /* ── Section header ─────────────────────────────────── */
        .section-head {
            margin-top: var(--section);
            margin-bottom: var(--gap);
            padding-bottom: 12px;
            border-bottom: 1px solid var(--rule);
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
        }
        .section-head h2 {
            font-size: 1.4rem;
            font-weight: 600;
        }
        .section-head .count {
            font-family: var(--serif);
            font-size: 0.9rem;
            color: var(--ink-light);
        }

        /* ── Buttons ────────────────────────────────────────── */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 10px 22px;
            font-family: var(--sans);
            font-size: 0.88rem;
            font-weight: 500;
            border: 1px solid var(--rule);
            border-radius: 4px;
            background: var(--white);
            color: var(--ink);
            cursor: pointer;
            transition: all 0.15s ease;
            text-decoration: none;
            white-space: nowrap;
        }
        .btn:hover {
            border-color: var(--ink-light);
            color: var(--ink);
        }
        .btn:focus-visible {
            outline: 2px solid var(--red);
            outline-offset: 2px;
        }

        .btn-primary {
            background: var(--ink);
            color: var(--white);
            border-color: var(--ink);
        }
        .btn-primary:hover {
            background: #333;
            border-color: #333;
            color: var(--white);
        }

        .btn-outline {
            background: transparent;
            border-color: var(--rule);
        }

        .btn-sm {
            padding: 6px 14px;
            font-size: 0.82rem;
        }

        /* ── Forms ───────────────────────────────────────────── */
        .search-group {
            display: flex;
            gap: 8px;
            max-width: 480px;
        }
        .search-input {
            flex: 1;
            padding: 10px 16px;
            font-family: var(--sans);
            font-size: 0.9rem;
            border: 1px solid var(--rule);
            border-radius: 4px;
            background: var(--white);
            color: var(--ink);
            transition: border-color 0.15s;
            min-width: 0;
        }
        .search-input:focus {
            outline: none;
            border-color: var(--ink);
        }
        .search-input::placeholder {
            color: var(--ink-muted);
        }

        /* ── Stat display (editorial) ───────────────────────── */
        .stat-group {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px 32px;
            margin: 48px 0;
        }
        .stat-item {
            overflow: hidden;
            min-width: 0;
        }
        .stat-value {
            font-family: var(--serif);
            font-size: clamp(2.5rem, 5vw, 4.5rem);
            font-weight: 700;
            line-height: 1.08;
            color: var(--ink);
            letter-spacing: -0.02em;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            padding-bottom: 2px;
        }
        .stat-value.accent {
            color: var(--red);
        }
        .stat-label {
            font-size: 0.82rem;
            color: var(--ink-light);
            margin-top: 2px;
            letter-spacing: 0.04em;
            white-space: nowrap;
        }

        /* ── Table (minimal) ────────────────────────────────── */
        .table-wrap {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.92rem;
        }

        thead th {
            font-family: var(--sans);
            font-weight: 500;
            font-size: 0.78rem;
            color: var(--ink-light);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            text-align: left;
            padding: 14px 16px;
            border-bottom: 2px solid var(--ink);
            white-space: nowrap;
        }

        tbody td {
            padding: 13px 16px;
            border-bottom: 1px solid var(--rule);
            color: var(--ink);
            vertical-align: middle;
        }

        tbody tr:hover td {
            background: var(--surface);
        }

        .movie-title {
            font-family: var(--serif);
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--ink);
        }
        .movie-title a {
            color: inherit;
        }
        .movie-title a:hover {
            color: var(--red);
        }

        .score-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-family: var(--serif);
            font-weight: 700;
            font-size: 1rem;
        }
        .score-badge .star {
            color: var(--red);
            font-size: 0.85rem;
        }

        /* ── Movie info sidebar ─────────────────────────────── */
        .detail-layout {
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 48px;
            align-items: start;
        }

        .info-card {
            background: var(--white);
            border: 1px solid var(--rule);
            border-radius: 4px;
            padding: 24px;
        }
        .info-card dl {
            display: grid;
            gap: 2px;
        }
        .info-card dt {
            font-size: 0.75rem;
            color: var(--ink-light);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-top: 14px;
        }
        .info-card dt:first-child { margin-top: 0; }
        .info-card dd {
            font-size: 0.9rem;
            color: var(--ink);
        }

        /* ── Genre tags ──────────────────────────────────────── */
        .genre-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .genre-tag {
            display: inline-block;
            padding: 3px 12px;
            font-size: 0.78rem;
            color: var(--ink-light);
            border: 1px solid var(--rule);
            border-radius: 2px;
            background: var(--white);
        }

        /* ── Comments ────────────────────────────────────────── */
        .comment-card {
            padding: 18px 0;
            border-bottom: 1px solid var(--rule);
        }
        .comment-header {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 6px;
        }
        .comment-author {
            font-weight: 600;
            font-size: 0.9rem;
        }
        .comment-meta {
            font-size: 0.78rem;
            color: var(--ink-light);
            white-space: nowrap;
        }
        .comment-body {
            font-size: 0.9rem;
            line-height: 1.7;
            color: var(--ink);
        }

        /* ── Chart display ──────────────────────────────────── */
        .chart-card {
            background: var(--white);
            border: 1px solid var(--rule);
            border-radius: 4px;
            margin-bottom: var(--gap);
            overflow: hidden;
        }
        .chart-card-header {
            padding: 16px 24px;
            border-bottom: 1px solid var(--rule);
            font-family: var(--serif);
            font-weight: 600;
            font-size: 1rem;
        }
        .chart-frame {
            width: 100%;
            height: 580px;
            border: none;
            display: block;
            background: var(--white);
        }

        /* ── Breadcrumb ──────────────────────────────────────── */
        .breadcrumb {
            display: flex;
            gap: 4px;
            font-size: 0.82rem;
            color: var(--ink-light);
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        .breadcrumb a {
            color: var(--ink-light);
        }
        .breadcrumb a:hover { color: var(--red); }
        .breadcrumb .sep {
            color: var(--ink-muted);
            margin: 0 4px;
        }

        /* ── Alerts (subtle) ────────────────────────────────── */
        .notice {
            padding: 18px 24px;
            border-radius: 4px;
            font-size: 0.9rem;
            margin-bottom: var(--gap);
        }
        .notice-warning {
            background: #fefce8;
            border: 1px solid #fde68a;
            color: #92400e;
        }
        .notice-info {
            background: var(--surface);
            border: 1px solid var(--rule);
            color: var(--ink-light);
        }
        .notice pre {
            margin-top: 8px;
            padding: 12px 16px;
            background: var(--white);
            border: 1px solid var(--rule);
            border-radius: 4px;
            font-family: var(--mono);
            font-size: 0.82rem;
            overflow-x: auto;
        }
        .notice ol, .notice ul {
            padding-left: 20px;
            margin-top: 4px;
        }
        .notice li {
            margin-bottom: 4px;
        }

        /* ── Pagination ─────────────────────────────────────── */
        .pagination {
            display: flex;
            gap: 4px;
            justify-content: center;
            margin-top: var(--gap);
            flex-wrap: wrap;
        }
        .page-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 36px;
            height: 36px;
            padding: 0 10px;
            font-size: 0.85rem;
            border: 1px solid var(--rule);
            border-radius: 4px;
            background: var(--white);
            color: var(--ink);
            transition: all 0.12s;
        }
        .page-link:hover {
            border-color: var(--ink-light);
        }
        .page-link.active {
            background: var(--ink);
            color: var(--white);
            border-color: var(--ink);
        }
        .page-link.disabled {
            color: var(--ink-muted);
            pointer-events: none;
            opacity: 0.5;
        }

        /* ── Utility ────────────────────────────────────────── */
        .mt-0 { margin-top: 0; }
        .mt-1 { margin-top: 8px; }
        .mt-2 { margin-top: 16px; }
        .mt-3 { margin-top: var(--gap); }
        .mt-4 { margin-top: 48px; }
        .mb-1 { margin-bottom: 8px; }
        .mb-2 { margin-bottom: 16px; }
        .mb-3 { margin-bottom: var(--gap); }
        .mb-4 { margin-bottom: 48px; }
        .text-muted { color: var(--ink-light); }

        /* ── Responsive ──────────────────────────────────────── */
        @media (max-width: 768px) {
            :root {
                --section: 56px;
                --gap: 18px;
            }

            .container {
                padding: 0 18px;
            }

            .masthead-nav {
                display: none;
                position: absolute;
                top: 56px;
                left: 0;
                right: 0;
                flex-direction: column;
                background: var(--white);
                border-bottom: 1px solid var(--rule);
                padding: 12px 18px;
                gap: 0;
            }
            .masthead-nav.open {
                display: flex;
            }
            .masthead-nav a {
                padding: 12px 0;
                border-bottom: 1px solid var(--rule);
                font-size: 0.95rem;
            }
            .masthead-toggle {
                display: block;
            }

            .stat-group {
                grid-template-columns: repeat(2, 1fr);
                gap: 28px 20px;
            }
            .stat-value {
                font-size: clamp(2.2rem, 7vw, 3.5rem);
            }

            .detail-layout {
                grid-template-columns: 1fr;
                gap: var(--gap);
            }

            .search-group {
                max-width: 100%;
            }

            .chart-frame {
                height: 420px;
            }
        }

        @media (max-width: 480px) {
            .stat-group {
                grid-template-columns: 1fr 1fr;
                gap: 24px 16px;
            }
            .stat-value {
                font-size: clamp(1.8rem, 6vw, 2.8rem);
            }
        }

        /* ── Reduced motion ─────────────────────────────────── */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }

        /* ── Print ──────────────────────────────────────────── */
        @media print {
            .masthead, .site-footer, .btn, .pagination, .search-group {
                display: none;
            }
            body {
                font-size: 12pt;
                color: #000;
                background: #fff;
            }
            a { color: #000; }
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <!-- Masthead -->
    <header class="masthead">
        <div class="container">
            <a href="/" class="masthead-brand">豆瓣电影档案</a>
            <button class="masthead-toggle" id="navToggle" aria-label="导航菜单">
                <span></span><span></span><span></span>
            </button>
            <nav>
                <ul class="masthead-nav" id="navMenu">
                    <li><a href="/"          class="{% if request.path == '/' %}active{% endif %}">总览</a></li>
                    <li><a href="/movies"    class="{% if request.path.startswith('/movies') %}active{% endif %}">电影</a></li>
                    <li><a href="/analysis"  class="{% if request.path.startswith('/analysis') %}active{% endif %}">分析</a></li>
                    <li><a href="/targets"   class="{% if request.path.startswith('/targets') %}active{% endif %}">爬取</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- Main content -->
    <main class="content">
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>

    <!-- Footer -->
    <footer class="site-footer">
        <div class="container">
            豆瓣电影信息采集与分析系统
        </div>
    </footer>

    <script>
        // Mobile nav toggle
        (function() {
            var btn = document.getElementById('navToggle');
            var menu = document.getElementById('navMenu');
            if (btn && menu) {
                btn.addEventListener('click', function() {
                    menu.classList.toggle('open');
                });
            }
        })();
    </script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
